<script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            html.classList.toggle('light', !isDark);
            themeIcon.textContent = isDark ? 'dark_mode' : 'light_mode';
            
            // Animation feedback
            themeIcon.style.transform = 'rotate(180deg) scale(0.8)';
            setTimeout(() => {
                themeIcon.style.transform = 'rotate(0deg) scale(1)';
            }, 200);
            
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Initialize theme from localStorage
        if (localStorage.getItem('theme') === 'dark') {
            html.classList.add('dark');
            html.classList.remove('light');
            themeIcon.textContent = 'dark_mode';
        }

        // Password Visibility Toggle
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
            
            // Subtle feedback scale
            eyeIcon.style.transform = 'scale(1.1)';
            setTimeout(() => eyeIcon.style.transform = 'scale(1)', 100);
        });

        // Form Submission visual feedback (simulation)
        const form = document.getElementById('login-form');
        form.addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.classList.add('opacity-80');
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Autenticando...</span>
            `;

            // Reset after 1.5s for demo purposes
            setTimeout(() => {
                btn.disabled = false;
                btn.classList.remove('opacity-80');
                btn.innerHTML = originalContent;
                alert('Lógica de login acionada. Em um ambiente de produção, isso chamaria sua API de autenticação.');
            }, 1500);
